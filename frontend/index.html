<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050505" />
    <meta name="description" content="New Samadhan Shoe Mart - The Elite Vault of Premium Footwear. Experience the next generation of shoe shopping with our curated collection and artisanal restoration services." />
    <title>Elite Vault | New Samadhan Shoe Mart 2026</title>
    <style>
      :root {
        --bg-color: #050505;
      }
      html, body {
        background-color: var(--bg-color);
        margin: 0;
        padding: 0;
        width: 100%;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      /* Custom scrollbar for premium dark feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #050505;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e1e1e;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #2563eb;
      }
      /* Prevent horizontal scroll on mobile */
      #root {
        width: 100%;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
